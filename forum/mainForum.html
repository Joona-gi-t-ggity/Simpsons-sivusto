<link rel="stylesheet" href="./forum/forum.css">

<section id="forum_content">
    <button 
        name="New message" id="newComment_btn"
        command="show-modal" 
        commandfor="commentPopup"> 
        New message 
    </button>
    <dialog id="commentPopup">
        <button command="close" commandfor="commentPopup"> Cancel </button>
        <h2>Create new message:</h2>
        <hr>
        <form id="commentForm">
            <label for="name">Posters name: </label>
            <input type="text" name="name" id="name">
            <br>
            <label for="title">Comment title: </label>
            <input type="text" name="title" id="title">
            <br>
            <label for="body">Comment contents: <br> </label>
            <textarea name="body" id="body"></textarea>
            <hr>
            <button onclick="forum_postMsg(event)" type="submit">Post comment</button>
        </form>
        
    </dialog>
    <hr>
    <h2 style="justify-self: center;"> Message board </h2>
    <hr>
    <section id="forum_messages"></section>
</section>
